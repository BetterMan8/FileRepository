# =========================================
#                锚点配置
# =========================================
anchor:
  # 代理提供商锚点
  BaseProvider: &BaseProvider
    type: http
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: "https://g.cn/generate_204"
      interval: 10
    override:
      skip-cert-verify: true
      udp: true
    path: ./providers/
    filter: >-
      ^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|剩余流量|距离下次重置剩余|套餐到期|跳转域名|4条不合适线路)).*$

  # 节点筛选正则
  # 香港
  FilterHK: &FilterHK
    filter: >-
      ^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG)).*$
  # 新加坡
  FilterSG: &FilterSG
    filter: >-
      ^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$
  # 日本
  FilterJP: &FilterJP
    filter: >-
      ^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$
  # 美国
  FilterUS: &FilterUS
    filter: >-
      ^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$
  # 台湾
  FilterTW: &FilterTW
    filter: >-
      ^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH)).*$

  # 策略组类型模板
  BaseUT: &BaseUT
    type: url-test
    include-all: true
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    use:
      - NCloud
      - Self-Built

  # 策略组代理列表模板 - 预定义的代理节点优先级排序
  SelectAU: &SelectAU
    type: url-test
    include-all: true
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    filter: "^((?!(直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|剩余流量|距离下次重置剩余|套餐到期|跳转域名|4条不合适线路)).)*$"
    use:
      - NCloud
      - Self-Built

  SelectMS: &SelectMS
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 台湾节点
      - 自动选择
      - 全球直连
    use:
      - NCloud
      - Self-Built

  SelectMH: &SelectMH
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连
    use:
      - NCloud
      - Self-Built

  SelectHK: &SelectHK
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectUS: &SelectUS
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectSG: &SelectSG
    type: select
    proxies:
      - 新加坡节点
      - 香港节点
      - 美国节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectJP: &SelectJP
    type: select
    proxies:
      - 日本节点
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

  SelectTW: &SelectTW
    type: select
    proxies:
      - 台湾节点
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 手动选择
      - 自动选择
      - 全球直连

  # Docker策略组模板
  DockerGroup: &DockerGroup
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连

# 规则提供者模板
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: text

# =========================================
#              代理提供商
# =========================================
proxy-providers:
  NCloud:
    <<: *BaseProvider
    url: "你的NCloud订阅链接"
    path: ./providers/ncloud.yaml
    
  Self-Built:
    <<: *BaseProvider
    url: "你的Self-Built订阅链接"
    path: ./providers/self-built.yaml

# =========================================
#                 外部访问配置
# =========================================
# HTTP 代理端口
port: 7890
# SOCKS 代理端口
socks-port: 7891
# 混合端口
mixed-port: 7893
# Redir 透明代理端口
redir-port: 7892
# TProxy 端口
tproxy-port:  7894
# 允许局域网访问
allow-lan:  true
# 监听所有网卡
bind-address: "*"
 # 身份验证
authentication:
  - mihomo:mihomo666

# =========================================
#                 内核运行配置
# =========================================
# 进程匹配
find-process-mode:  strict
# 运行模式
mode: rule
# 日志等级
log-level:  warning
# 禁用IPV6支持
ipv6: false
# 持久化设置
profile:
# 面板策略组持久化
  store-selected: true
  # Fake-ip持久化
  store-fake-ip:  true
# TCP并发
tcp-concurrent: true
# 统一延迟
unified-delay:  true
# TCP 保活间隔
keep-alive-interval:  15
# TCP 空闲等待 
keep-alive-idle:  600

# =========================================
#                 面板配置
# =========================================
# 面板路径
external-ui:  ui
# 面板名称
external-ui-name: zashboard
# 面板下载地址
external-ui-url:  https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
# 面板监听端口
external-controller:  "0.0.0.0:9090"
# 面板访问密码
secret: "Zuifeng@2012"

# =========================================
#                 GEO 数据库配置
# =========================================
# 各个数据库源地址
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.metadb"
# GEO加载模式
geodata-loader: standard
 # 自动更新
geo-auto-update:  true
# 间隔一天（24小时）
geo-update-interval:  24

# =========================================
#             TUN入站配置
# =========================================
tun:
  # 启用 TUN 功能，用于透明代理
  enable: true
  # 使用混合协议栈（支持 TCP + UDP）
  stack:  mixed
  # TUN 虚拟网卡名称，可自定义
  device: mihomo
  # DNS 劫持设置                                                
  dns-hijack:
    - any:53
    - tcp://any:53
  # 自动添加路由表
  auto-route: true
  # 自动检测网络接口，绑定 TUN
  auto-detect-interface:  true
  # 自动重定向流量到 TUN
  auto-redirect:  true
  # 启用端点独立 NAT，保证 UDP 稳定性
  endpoint-independent-nat: true

# =========================================
#                 流量嗅探
# =========================================
sniffer:
  # 开启用嗅探功能
  enable: true
  # 强制 DNS 映射 (从 Fake-IP 还原域名)
  force-dns-mapping: true
  # 嗅探纯 IP (强制对 IP 进行反向探测)
  parse-pure-ip: true
  # 使用嗅探结果覆盖连接目标（推荐开启）
  override-destination: true
  # 嗅探协议配置
  sniff:
    # QUIC 协议嗅探（HTTP/3）
    QUIC:
      ports: [443, 8443]
    # TLS 协议嗅探（HTTPS）
    TLS:
      ports: [443, 8443]
    # HTTP 协议嗅探
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true 
  # 强制嗅探识别的域名
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"   # Disney+
    - "+.hbo.com"
    - "+.hbomaxcdn.com"
    - "+.tiktok.com"
  # 跳过嗅探的域名 (白名单：防止误杀/断流)
  skip-domain:
    - "Mijia Cloud"
    - dlg.io.mi.com
    - "+.push.apple.com"
    - "+.oray.com"      # 向日葵
    - "+.sunlogin.net"
    - "+.crashlytics.com"
    # PT站点域名
    - "+.m-team.cc"
    - "+.pterclub.net"
    - "+.ptchdbits.co"
    - "+.hdsky.me"
    - "+.totheglory.im"
    - "+.springsunday.net"
    - "+.ourbits.club"
    - "+.hdhome.org"
    - "+.audiences.me"
    - "+.hhanclub.net"
    - "+.keepfrds.com"
    - "+.hddolby.com"
    - "+.soulvoice.club"
    - "+.hdarea.club"
    - "+.hdtime.org"
    - "+.ubits.club"
    - "+.btschool.club"
    - "+.agsvpt.com"
    - "+.pttime.org"
    - "+.pandapt.net"
    - "+.nicept.net"
    - "+.dmhy.org"
    - "+.carpt.net"
    - "+.open.cd"
    - "+.andycloud.cn"
    - "+.688009.xyz"
    - "+.zitingzs.com"
    - "+.unraid.net"

# =========================================
#                 DNS 配置
# =========================================
dns:
  # 启用 DNS 功能
  enable: true
  # 禁用 IPv6 解析
  ipv6: false
  # 启用 Fake-IP
  enhanced-mode:  fake-ip
  # IPv4 Fake-IP 网段
  fake-ip-range:  198.18.0.1/16
  # DNS 监听地址和端口
  listen: 0.0.0.0:1053
  # 是否遵循DNS规则
  respect-rules:  false
  # Fake-IP 黑名单模式
  fake-ip-filter-mode:  blacklist
  # DNS 上游服务器（用于国内域名解析）
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  # 默认DNS服务器 （用于解析上游Doh和兜底解析）
  default-nameserver:
    - https://223.5.5.5/dns-query
    - tls://1.1.1.1:853
  # fake-ip 黑名单列表 (列表内的域名解析将返回真实ip)
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.home"
    - "*.arpa"
    - rule-set,cn
    - rule-set,private
    # PT站点域名
    - "m-team.cc"
